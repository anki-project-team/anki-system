<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="description" content="IHK AP1 Prüfungsvorbereitung — Learn-Factory">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Learn-Factory">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Learn-Factory — IHK AP1</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Kein weißer Flash beim Start — Navy vor Flutter-Load */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #162447;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body style="background-color: #162447;">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(
        'firebase-messaging-sw.js',
        {scope: '/'}
      ).then(function(registration) {
        console.log('SW registered:', registration.scope);
      }).catch(function(error) {
        console.log('SW registration failed:', error);
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
