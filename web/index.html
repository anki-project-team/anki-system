<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="description" content="IHK AP1 Prüfungsvorbereitung — Learn-Factory">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Learn-Factory">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Learn-Factory — IHK AP1</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #162447;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body style="background-color: #162447;">
  <script>
    // ── Service Worker: Auto-Update bei neuem Deploy ──────
    if ('serviceWorker' in navigator) {
      // Firebase Messaging SW (Push-Notifications)
      navigator.serviceWorker.register(
        'firebase-messaging-sw.js',
        {scope: '/firebase-cloud-messaging-push-scope'}
      ).then(function(reg) {
        console.log('Firebase SW registered:', reg.scope);
      }).catch(function(err) {
        console.log('Firebase SW failed:', err);
      });

      // Flutter SW — auf Updates prüfen und sofort aktivieren
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(reg) {
          // Prüfe alle 60 Sekunden auf neue Version
          reg.update();
          setInterval(function() { reg.update(); }, 60000);

          // Neue Version gefunden? Sofort aktivieren!
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'activated') {
                  console.log('Neue App-Version aktiv — lade neu...');
                  window.location.reload();
                }
              });
            }
          });
        });
      });

      // Wenn ein neuer SW die Kontrolle übernimmt → Reload
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        console.log('Neuer Service Worker aktiv — Seite wird neu geladen');
        window.location.reload();
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
